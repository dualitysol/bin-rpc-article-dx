# ─────────────────────────────────────────────────────────────
# Benchmark — @layra/article-dx
# Manual trigger: benchmarks binary + JSON servers.
# ─────────────────────────────────────────────────────────────

name: Benchmark

on:
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate binary payload
        run: npx tsx benchmarks/generate-payload.ts

      - name: Start binary server (background)
        run: |
          nohup npx tsx src/servers/binary-server.ts > /tmp/binary-server.log 2>&1 &
          echo "BINARY_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "Binary server ready"
              break
            fi
            sleep 1
          done
          # Verify server is up
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/health 2>/dev/null || echo "000")
          if [ "$code" != "200" ]; then
            echo "Binary server failed to start"; cat /tmp/binary-server.log; exit 1
          fi

      - name: Start Fastify server (background)
        run: |
          nohup npx tsx src/servers/fastify-server.ts > /tmp/fastify-server.log 2>&1 &
          echo "FASTIFY_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3002/health 2>/dev/null || echo "000")
            if [ "$code" = "200" ]; then
              echo "Fastify server ready"
              break
            fi
            sleep 1
          done
          # Verify server is up
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3002/health 2>/dev/null || echo "000")
          if [ "$code" != "200" ]; then
            echo "Fastify server failed to start"; cat /tmp/fastify-server.log; exit 1
          fi

      - name: Run benchmarks
        run: npx tsx benchmarks/run.ts --both --ci

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/
          if-no-files-found: warn

      - name: Stop servers
        if: always()
        run: |
          kill $BINARY_PID 2>/dev/null || true
          kill $FASTIFY_PID 2>/dev/null || true
          wait $BINARY_PID 2>/dev/null || true
          wait $FASTIFY_PID 2>/dev/null || true
          echo "Servers stopped"
